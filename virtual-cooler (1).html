<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Cooler 🌀</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2e8ec4;
      --accent-deep: #1a6b9a;
      --accent-light: #4a8faa;
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.88);
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #d0eeff 0%, #b8e0ff 40%, #caf0fc 100%);
      overflow: hidden;
      transition: background 1.2s cubic-bezier(.4, 0, .2, 1);
    }

    /* --- Ambient floating orbs --- */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
      opacity: 0;
      animation: orbFloat 18s ease-in-out infinite, orbFadeIn 1.5s ease forwards;
    }

    .ambient-orb:nth-child(1) {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(91, 184, 232, 0.30), transparent 70%);
      top: -80px;
      left: -60px;
      animation-delay: 0s;
    }

    .ambient-orb:nth-child(2) {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(180, 230, 255, 0.35), transparent 70%);
      bottom: -60px;
      right: -40px;
      animation-delay: -6s;
    }

    .ambient-orb:nth-child(3) {
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(130, 210, 255, 0.25), transparent 70%);
      top: 50%;
      left: 60%;
      animation-delay: -12s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(30px, -20px) scale(1.05);
      }

      50% {
        transform: translate(-15px, 25px) scale(0.95);
      }

      75% {
        transform: translate(20px, 10px) scale(1.02);
      }
    }

    @keyframes orbFadeIn {
      to {
        opacity: 1;
      }
    }

    /* --- Card --- */
    .card {
      position: relative;
      z-index: 1;
      width: 360px;
      background: var(--glass-bg);
      border: 1.5px solid var(--glass-border);
      border-radius: 36px;
      padding: 40px 30px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 8px 48px rgba(91, 180, 240, 0.15),
        0 2px 12px rgba(91, 180, 240, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      text-align: center;
      overflow: hidden;
      /* Entrance animation */
      opacity: 0;
      transform: translateY(40px) scale(0.96);
      animation: cardEntrance 0.9s cubic-bezier(.22, .68, 0, 1.1) 0.2s forwards;
      transition: box-shadow 0.6s ease, transform 0.4s ease;
    }

    .card:hover {
      box-shadow:
        0 12px 56px rgba(91, 180, 240, 0.22),
        0 4px 16px rgba(91, 180, 240, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transform: translateY(-2px);
    }

    @keyframes cardEntrance {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* --- Snow / Particles --- */
    #snowContainer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 36px;
      z-index: 0;
    }

    .snowflake {
      position: absolute;
      color: rgba(100, 190, 240, 0.45);
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
      will-change: transform, opacity;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) translateX(0) rotate(0deg);
        opacity: 0;
      }

      6% {
        opacity: 0.8;
      }

      50% {
        transform: translateY(210px) translateX(12px) rotate(180deg);
        opacity: 0.6;
      }

      100% {
        transform: translateY(460px) translateX(-6px) rotate(360deg);
        opacity: 0;
      }
    }

    .content {
      position: relative;
      z-index: 1;
    }

    /* --- Tag --- */
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(91, 184, 232, 0.08);
      border: 1px solid rgba(91, 184, 232, 0.12);
      border-radius: 50px;
      padding: 6px 18px;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeSlideDown 0.6s ease 0.6s forwards;
    }

    @keyframes fadeSlideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Fan --- */
    .fan-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 8px;
      width: 160px;
      height: 160px;
      opacity: 0;
      transform: scale(0.7);
      animation: fanEntrance 0.8s cubic-bezier(.22, .68, 0, 1.1) 0.5s forwards;
    }

    @keyframes fanEntrance {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #fanSvg {
      width: 160px;
      height: 160px;
      filter: drop-shadow(0 6px 24px rgba(91, 184, 232, 0.30));
      transition: filter 0.6s ease;
    }

    #fanBlades {
      transform-origin: 75px 75px;
      animation: spin 1.5s linear infinite;
      transition: animation-duration 0.5s ease;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Outer pulsing glow ring */
    .glow-ring {
      transform-origin: 75px 75px;
      opacity: 0.3;
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        opacity: 0.2;
        transform: scale(1);
      }

      50% {
        opacity: 0.45;
        transform: scale(1.03);
      }
    }

    /* --- Wind Lines --- */
    .wind-lines {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin: 12px auto 8px;
      align-items: center;
      width: 150px;
      opacity: 0;
      animation: fadeSlideDown 0.5s ease 0.8s forwards;
    }

    .wind-line {
      height: 2.5px;
      border-radius: 2px;
      background: linear-gradient(to right, transparent, rgba(91, 184, 232, 0.65), transparent);
      animation: windMove 1.4s ease-in-out infinite;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes windMove {
      0% {
        transform: scaleX(0.15) translateX(-10px);
        opacity: 0;
      }

      25% {
        opacity: 0.9;
      }

      75% {
        opacity: 0.6;
      }

      100% {
        transform: scaleX(1.15) translateX(8px);
        opacity: 0;
      }
    }

    /* --- Temperature --- */
    .temp-block {
      margin: 12px 0 6px;
      opacity: 0;
      animation: fadeSlideDown 0.5s ease 0.9s forwards;
    }

    .temp-num {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent-deep);
      transition: color 0.8s cubic-bezier(.4, 0, .2, 1), transform 0.3s ease;
      display: inline-block;
    }

    .temp-num.bounce {
      animation: tempBounce 0.4s cubic-bezier(.22, .68, 0, 1.1);
    }

    @keyframes tempBounce {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.12);
      }

      100% {
        transform: scale(1);
      }
    }

    .temp-label {
      font-size: 13px;
      color: #3d7a96;
      margin-top: 6px;
      font-weight: 600;
      transition: color 0.6s ease;
    }

    /* --- Feeling text --- */
    .feeling {
      font-size: 15px;
      font-weight: 700;
      color: #2a7d9e;
      min-height: 24px;
      margin: 12px 0 22px;
      transition: color 0.5s ease, opacity 0.3s ease, transform 0.3s ease;
      opacity: 0;
      animation: fadeSlideDown 0.5s ease 1s forwards;
    }

    .feeling.text-swap {
      animation: textSwap 0.45s cubic-bezier(.4, 0, .2, 1);
    }

    @keyframes textSwap {
      0% {
        opacity: 1;
        transform: translateY(0);
      }

      40% {
        opacity: 0;
        transform: translateY(-8px);
      }

      60% {
        opacity: 0;
        transform: translateY(8px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- Slider --- */
    .slider-wrap {
      background: rgba(91, 184, 232, 0.06);
      border: 1.5px solid rgba(91, 184, 232, 0.12);
      border-radius: 20px;
      padding: 20px 22px;
      margin-bottom: 14px;
      transition: background 0.5s ease, border-color 0.5s ease;
      opacity: 0;
      animation: fadeSlideDown 0.5s ease 1.1s forwards;
    }

    .slider-wrap:hover {
      background: rgba(91, 184, 232, 0.09);
      border-color: rgba(91, 184, 232, 0.20);
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .slider-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #3d7a96;
      transition: color 0.5s ease;
    }

    .slider-val {
      font-size: 15px;
      font-weight: 800;
      color: #1a6b9a;
      transition: color 0.5s ease, transform 0.2s ease;
      display: inline-block;
    }

    .slider-val.pop {
      animation: valPop 0.3s cubic-bezier(.22, .68, 0, 1.1);
    }

    @keyframes valPop {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }

    /* --- Custom range slider --- */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--slider-pct, 50%), rgba(91, 184, 232, 0.15) var(--slider-pct, 50%), rgba(91, 184, 232, 0.15) 100%);
      outline: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6ec5f0, #3ba8de);
      box-shadow: 0 0 12px rgba(91, 184, 232, 0.45), 0 2px 6px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: box-shadow 0.3s ease, transform 0.2s cubic-bezier(.22, .68, 0, 1.1);
      border: 2.5px solid rgba(255, 255, 255, 0.8);
    }

    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 22px rgba(91, 184, 232, 0.7), 0 2px 8px rgba(0, 0, 0, 0.1);
      transform: scale(1.15);
    }

    input[type=range]:active::-webkit-slider-thumb {
      transform: scale(1.08);
      box-shadow: 0 0 28px rgba(91, 184, 232, 0.85);
    }

    input[type=range]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border: 2.5px solid rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      background: linear-gradient(135deg, #6ec5f0, #3ba8de);
      cursor: pointer;
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }

    input[type=range]::-moz-range-track {
      height: 6px;
      border-radius: 4px;
      background: rgba(91, 184, 232, 0.15);
    }

    /* --- Footer --- */
    .footer-text {
      margin-top: 18px;
      font-size: 12px;
      color: #5a94aa;
      font-weight: 600;
      opacity: 0;
      animation: fadeSlideDown 0.5s ease 1.2s forwards;
      transition: color 0.5s ease;
    }

    .footer-text:hover {
      color: var(--accent-deep);
    }

    /* --- Mode classes for temperature-based theming --- */
    body.cool-mode {
      background: linear-gradient(145deg, #c0e8ff 0%, #a0d4f5 40%, #b8e8fc 100%);
    }

    body.cold-mode {
      background: linear-gradient(145deg, #a8d8f0 0%, #82c0e8 40%, #98d0f0 100%);
    }

    body.freeze-mode {
      background: linear-gradient(145deg, #8ac0e0 0%, #5a9cc8 40%, #70b0d8 100%);
    }

    body.hot-mode {
      background: linear-gradient(145deg, #ffe8d0 0%, #ffd4b0 40%, #ffe0c0 100%);
    }

    /* --- Ripple effect on slider interaction --- */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(91, 184, 232, 0.15);
      transform: scale(0);
      animation: rippleExpand 0.7s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleExpand {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Ambient orbs -->
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>
  <div class="ambient-orb"></div>

  <div class="card" id="mainCard">
    <div id="snowContainer"></div>

    <div class="content">
      <div class="tag">Virtual Cooler 🌬️</div>

      <div class="fan-wrap">
        <svg id="fanSvg" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
          <!-- outer dashed grill ring with glow -->
          <circle class="glow-ring" cx="75" cy="75" r="72" fill="none" stroke="rgba(91,184,232,0.2)" stroke-width="3" />
          <circle cx="75" cy="75" r="70" fill="none" stroke="#b0dcf5" stroke-width="2" stroke-dasharray="4 5"
            opacity="0.7" />
          <!-- inner bg circle -->
          <circle cx="75" cy="75" r="56" fill="rgba(91,184,232,0.04)" stroke="#d0f0fc" stroke-width="1.5" />

          <!-- spinning blades -->
          <g id="fanBlades">
            <path d="M75 75 Q58 28 75 8 Q97 22 80 64 Z" fill="#5bb8e8" opacity="0.90" />
            <path d="M75 75 Q122 58 142 75 Q128 97 84 80 Z" fill="#7ec8f0" opacity="0.90" />
            <path d="M75 75 Q92 122 75 142 Q53 128 70 86 Z" fill="#5bb8e8" opacity="0.90" />
            <path d="M75 75 Q28 92 8 75 Q22 53 66 70 Z" fill="#7ec8f0" opacity="0.90" />

            <!-- blade shine -->
            <path d="M75 75 Q64 42 75 16 Q82 28 79 67 Z" fill="white" opacity="0.25" />
            <path d="M75 75 Q108 64 134 75 Q122 84 81 79 Z" fill="white" opacity="0.25" />
            <path d="M75 75 Q86 108 75 134 Q68 122 71 81 Z" fill="white" opacity="0.25" />
            <path d="M75 75 Q42 86 16 75 Q28 68 69 71 Z" fill="white" opacity="0.25" />

            <!-- hub -->
            <circle cx="75" cy="75" r="14" fill="url(#hubGrad)" />
            <circle cx="75" cy="75" r="8.5" fill="#bee8f9" />
            <circle cx="75" cy="75" r="3.5" fill="#3ba8de" />
          </g>

          <defs>
            <radialGradient id="hubGrad" cx="40%" cy="35%">
              <stop offset="0%" stop-color="#5cc0ee" />
              <stop offset="100%" stop-color="#2e96c8" />
            </radialGradient>
          </defs>
        </svg>
      </div>

      <!-- wind lines -->
      <div class="wind-lines" id="windLines">
        <div class="wind-line" style="width:105px; animation-delay:0s;"></div>
        <div class="wind-line" style="width:135px; animation-delay:0.22s;"></div>
        <div class="wind-line" style="width:80px;  animation-delay:0.44s;"></div>
        <div class="wind-line" style="width:118px; animation-delay:0.12s;"></div>
      </div>

      <div class="temp-block">
        <div class="temp-num" id="tempNum">38°C</div>
        <div class="temp-label" id="tempLabel">Lucknow outside 😅</div>
      </div>

      <div class="feeling" id="feelingText">Slide to feel the breeze~</div>

      <div class="slider-wrap">
        <div class="slider-header">
          <span class="slider-label">Fan speed</span>
          <span class="slider-val" id="coolVal">5 🌀</span>
        </div>
        <input type="range" id="coolSlider" min="1" max="10" value="5">
      </div>

      <div class="footer-text">made with 💙 to keep Lavvi cool</div>
    </div>
  </div>

  <script>
    const feelings = [
      "",
      "Barely moving... 😐",
      "Gentle flutter 🍃",
      "Nice breeze ✨",
      "Feeling it~ 😌",
      "So refreshing!! 😍",
      "Arctic blast! 🥶",
      "Himalayan winds! ❄️",
      "Siberia mode 🌨️",
      "Deep freeze!! 🧊",
      "ABSOLUTE ZERO!! 🥶❄️"
    ];

    const temps = [38, 36, 34, 31, 28, 24, 20, 15, 10, 5, 2];
    const tempColors = [
      "#c45a10", "#b84e0a", "#a04208",
      "#1a6b9a", "#186090", "#155580",
      "#124a72", "#0e3f66", "#0a3458", "#08284a", "#051e3a"
    ];

    const tempLabels = [
      "Lucknow outside 😅", "Still toasty 🥵", "Getting warmer 🌤️",
      "Room temperature 🏠", "Comfortable 😊", "Nice & cool 😌",
      "Chilly vibes 🧣", "Quite cold! 🧤", "Freezing cold 🥶",
      "Sub-zero! 🧊", "Absolute zero! ❄️"
    ];

    const slider = document.getElementById('coolSlider');
    const valEl = document.getElementById('coolVal');
    const feelEl = document.getElementById('feelingText');
    const tempEl = document.getElementById('tempNum');
    const tempLbl = document.getElementById('tempLabel');
    const body = document.body;

    let lastVal = 5;

    function updateSliderTrack(val) {
      const pct = ((val - 1) / 9) * 100;
      slider.style.setProperty('--slider-pct', pct + '%');
    }

    function spawnSnow(count) {
      const c = document.getElementById('snowContainer');
      // Fade out existing snowflakes gracefully
      const existing = c.querySelectorAll('.snowflake');
      existing.forEach(s => {
        s.style.opacity = '0';
        s.style.transition = 'opacity 0.4s ease';
      });

      setTimeout(() => {
        c.innerHTML = '';
        const chars = ['·', '•', '❄', '✦', '⁕', '~', '°'];
        for (let i = 0; i < count; i++) {
          const s = document.createElement('div');
          s.className = 'snowflake';
          s.textContent = chars[Math.floor(Math.random() * chars.length)];
          s.style.left = (Math.random() * 92) + '%';
          s.style.fontSize = (7 + Math.random() * 11) + 'px';
          const dur = 2.8 + Math.random() * 4.5;
          s.style.animationDuration = dur + 's';
          s.style.animationDelay = (Math.random() * dur) + 's';
          c.appendChild(s);
        }
      }, 200);
    }

    function setBodyMode(val) {
      body.classList.remove('hot-mode', 'cool-mode', 'cold-mode', 'freeze-mode');
      if (val <= 2) body.classList.add('hot-mode');
      else if (val >= 4 && val <= 6) body.classList.add('cool-mode');
      else if (val >= 7 && val <= 8) body.classList.add('cold-mode');
      else if (val >= 9) body.classList.add('freeze-mode');
    }

    function updateCool(val) {
      val = parseInt(val);

      // Slider value badge animation
      valEl.textContent = val + ' 🌀';
      valEl.classList.remove('pop');
      void valEl.offsetWidth; // force reflow
      valEl.classList.add('pop');

      // Feeling text swap animation
      if (val !== lastVal) {
        feelEl.classList.remove('text-swap');
        void feelEl.offsetWidth;
        feelEl.classList.add('text-swap');
        setTimeout(() => {
          feelEl.textContent = feelings[val];
        }, 180);
      }

      // Temperature with bounce
      tempEl.textContent = temps[val - 1] + '°C';
      tempEl.style.color = tempColors[val - 1];
      tempEl.classList.remove('bounce');
      void tempEl.offsetWidth;
      tempEl.classList.add('bounce');

      // Temperature label
      tempLbl.textContent = tempLabels[val - 1];

      // Fan spin: faster with higher value — smooth transition
      const spinDur = Math.max(0.18, 2.8 - val * 0.26);
      document.getElementById('fanBlades').style.animationDuration = spinDur + 's';

      // Fan glow intensity
      const glowIntensity = 0.2 + (val / 10) * 0.3;
      document.getElementById('fanSvg').style.filter =
        `drop-shadow(0 6px ${14 + val * 3}px rgba(91,184,232,${glowIntensity}))`;

      // Wind lines speed
      const windDur = Math.max(0.3, 1.8 - val * 0.14);
      document.querySelectorAll('.wind-line').forEach(l => {
        l.style.animationDuration = windDur + 's';
      });

      // Background mode
      setBodyMode(val);

      // Snow particles scale with fan speed
      spawnSnow(Math.max(3, val * 3));

      // Slider track
      updateSliderTrack(val);

      lastVal = val;
    }

    // Smooth slider interaction
    slider.addEventListener('input', (e) => {
      updateCool(e.target.value);
    });

    // Initialise
    updateSliderTrack(5);
    spawnSnow(15);
    updateCool(5);
  </script>
</body>

</html>
